<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tollbooth</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="card">
    <div class="logo">🛑 Tollbooth</div>
    <div class="tagline">Your wallet's bodyguard.</div>

    <div class="status-pill" id="statusPill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Loading...</span>
    </div>

    <label class="toggle-row">
      <div class="toggle-label">Protection</div>
      <div class="toggle-switch">
        <input type="checkbox" id="enabledToggle" />
        <span class="slider"></span>
      </div>
    </label>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="blockCount">0</div>
        <div class="stat-label">Stopped this week</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value" id="savedAmount">$0</div>
        <div class="stat-label">Potentially saved</div>
      </div>
    </div>

    <button id="dashboardBtn" class="dashboard-btn">View Dashboard →</button>

    <div class="footer">Your future self thanks you 🙏</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
