<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tollbooth</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="title">Tollbooth</div>
      <div class="status" id="status">Loading…</div>
      <label class="toggle">
        <input id="enabledToggle" type="checkbox" />
        <span>Protection enabled</span>
      </label>
      <div class="meta">
        <span id="eventCount">0</span> events logged
      </div>
      <button id="dashboardBtn">Open Dashboard</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
