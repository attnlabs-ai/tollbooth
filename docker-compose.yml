services:
  postgres:
    image: postgres:16
    container_name: tollbooth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tollbooth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    image: node:20
    container_name: tollbooth-backend
    working_dir: /app
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tollbooth
      JWT_SECRET: change_me
    volumes:
      - ./backend:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    depends_on:
      - postgres

volumes:
  postgres_data:
